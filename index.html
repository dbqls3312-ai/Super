<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INSURANCE ONLINE - 맞춤 보험료 스카우트</title>
    <!-- SEO Meta Tags -->
    <meta name="description" content="보험 가입 전 필수 코스! 복잡한 보험료 비교, 원하는 보험을 선택하고 1분 만에 최저가 견적 카드를 뽑아보세요.">
    <meta name="keywords" content="보험료비교, 다이렉트보험, 종합보험, 간병보험, 운전자보험, 치아보험">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Web Font: Pretendard -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Pretendard"', 'sans-serif'],
                    },
                    colors: {
                        fcbg: '#0a0e17',
                        fcpanel: '#151b2b',
                        fcaccent: '#d4ff00',
                        fctext: '#e2e8f0',
                        fcgold: '#fbbf24',
                        fcgolddark: '#78350f',
                        fcgoldlight: '#fef08a',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #0a0e17;
            color: #e2e8f0;
            overflow-x: hidden;
            letter-spacing: -0.02em;
        }

        /* 체크박스 커스텀 */
        input[type="checkbox"] {
            appearance: none;
            background-color: #0a0e17;
            border: 1px solid #4b5563;
            width: 1.5rem;
            height: 1.5rem;
            display: inline-block;
            position: relative;
        }

        input[type="checkbox"]:checked {
            background-color: #d4ff00;
            border-color: #d4ff00;
        }

        input[type="checkbox"]:checked::after {
            content: '✔';
            position: absolute;
            color: black;
            font-size: 16px;
            font-weight: 900;
            left: 4px;
            top: -1px;
        }

        .fc-input:focus {
            outline: none;
            border-color: #fbbf24;
            box-shadow: 0 0 8px rgba(251, 191, 36, 0.3);
        }

        /* 성별 버튼 기본 스타일 */
        .gender-btn {
            flex: 1;
            padding: 1rem 0;
            background-color: #151b2b;
            border: 2px solid #374151;
            color: #9ca3af;
            font-weight: 900;
            font-size: 1.25rem;
            transition: all 0.2s;
            cursor: pointer;
        }

        /* 성별 버튼 활성화(선택) 스타일 */
        .gender-btn.active {
            background-color: #d4ff00 !important;
            border-color: #d4ff00 !important;
            color: #000 !important;
            box-shadow: 0 0 20px rgba(212, 255, 0, 0.6);
        }

        .btn-game {
            transform: skewX(-5deg);
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }

        .btn-game>div {
            transform: skewX(5deg);
        }

        .btn-game:hover {
            transform: skewX(-5deg) scale(1.02);
            box-shadow: 0 0 15px rgba(212, 255, 0, 0.4);
        }

        .btn-game.gold:hover {
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.5);
        }

        .ins-radio:checked+div {
            border-color: #d4ff00;
            background-color: rgba(212, 255, 0, 0.1);
            box-shadow: 0 0 15px rgba(212, 255, 0, 0.3);
            transform: translateY(-2px);
        }

        .ins-radio:checked+div .check-icon {
            opacity: 1;
        }

        #pack-overlay {
            z-index: 9999;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #27272a 0%, #000000 100%);
            display: none;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            padding-bottom: 50px;
            perspective: 1000px;
        }

        @keyframes screenShake {

            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
                filter: blur(0px);
            }

            10% {
                transform: translate(-15px, -15px) rotate(-2deg);
                filter: blur(2px);
            }

            20% {
                transform: translate(15px, 15px) rotate(2deg);
                filter: blur(0px);
            }

            30% {
                transform: translate(-20px, 10px) rotate(-3deg);
                filter: blur(3px);
            }

            40% {
                transform: translate(20px, -10px) rotate(3deg);
                filter: blur(0px);
            }

            50% {
                transform: translate(-15px, -20px) rotate(-2deg);
                filter: blur(2px);
            }

            60% {
                transform: translate(15px, 20px) rotate(2deg);
                filter: blur(0px);
            }

            70% {
                transform: translate(-10px, 15px) rotate(-1deg);
                filter: blur(1px);
            }

            80% {
                transform: translate(10px, -15px) rotate(1deg);
                filter: blur(0px);
            }

            90% {
                transform: translate(-5px, -10px) rotate(0deg);
                filter: blur(1px);
            }
        }

        .overlay-shake {
            animation: screenShake 0.5s cubic-bezier(.36, .07, .19, .97) both;
        }

        .stage-light {
            position: absolute;
            top: 0;
            left: -50%;
            width: 200%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(0, 240, 255, 0.15) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 1s ease-in;
            pointer-events: none;
            z-index: 0;
        }

        .fc-card-container {
            perspective: 1500px;
            width: 320px;
            height: 480px;
            display: none;
            z-index: 10;
            margin-top: 15vh;
            position: relative;
            transition: transform 0.1s;
        }

        .fc-card-container:active {
            transform: scale(0.95);
        }

        .glow-orb {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.5) 0%, rgba(59, 130, 246, 0.25) 40%, transparent 70%);
            border-radius: 50%;
            opacity: 0;
            z-index: -2;
            pointer-events: none;
        }

        .fc-card-container.reveal .glow-orb {
            animation: rayFadeIn 1s forwards, orbPulse 4s ease-in-out infinite;
        }

        @keyframes orbPulse {

            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                transform: translate(-50%, -50%) scale(1.15);
            }
        }

        .light-rays {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1400px;
            height: 1400px;
            background: repeating-conic-gradient(from 0deg,
                    rgba(0, 240, 255, 0) 0deg,
                    rgba(0, 240, 255, 0) 5deg,
                    rgba(186, 230, 253, 0.4) 10deg,
                    rgba(0, 240, 255, 0) 15deg,
                    rgba(0, 240, 255, 0) 20deg);
            border-radius: 50%;
            -webkit-mask-image: radial-gradient(circle, rgba(0, 0, 0, 1) 15%, rgba(0, 0, 0, 0) 65%);
            mask-image: radial-gradient(circle, rgba(0, 0, 0, 1) 15%, rgba(0, 0, 0, 0) 65%);
            opacity: 0;
            z-index: -1;
            pointer-events: none;
        }

        .fc-card-container.reveal .light-rays {
            animation: rayFadeIn 0.8s forwards, raySpin 25s linear infinite;
        }

        @keyframes raySpin {
            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        @keyframes rayFadeIn {
            0% {
                opacity: 0;
            }

            100% {
                opacity: 1;
            }
        }

        .screen-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #ffffff;
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
        }

        .screen-flash.explode {
            animation: nuclearFlash 0.8s ease-out forwards;
        }

        @keyframes nuclearFlash {
            0% {
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }

        .fc-card-inner {
            width: 100%;
            height: 100%;
            transition: transform 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            transform-style: preserve-3d;
            transform: rotateY(180deg) scale(0.5);
        }

        .fc-card-container.reveal .fc-card-inner {
            transform: rotateY(0deg) scale(1);
        }

        @keyframes floatCard {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        @keyframes pulseGlowBack {

            0%,
            100% {
                box-shadow: 0 0 30px rgba(0, 240, 255, 0.4);
                filter: brightness(1);
            }

            50% {
                box-shadow: 0 0 60px rgba(0, 240, 255, 0.8);
                filter: brightness(1.3);
            }
        }

        .fc-card-container.waiting-click {
            animation: floatCard 2.5s ease-in-out infinite;
            cursor: pointer;
        }

        .fc-card-container.waiting-click .fc-card-back {
            animation: pulseGlowBack 2s infinite;
        }

        .tap-to-open {
            position: absolute;
            bottom: -70px;
            left: 50%;
            transform: translateX(-50%);
            color: #00f0ff;
            font-weight: 900;
            font-size: 1.3rem;
            white-space: nowrap;
            animation: pulseText 1.2s infinite;
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.8);
            pointer-events: none;
            display: none;
        }

        @keyframes pulseText {

            0%,
            100% {
                opacity: 1;
                transform: translateX(-50%) scale(1);
            }

            50% {
                opacity: 0.4;
                transform: translateX(-50%) scale(0.95);
            }
        }

        .fc-card-front,
        .fc-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }

        .fc-card-back {
            background: linear-gradient(135deg, #111827, #1e3a8a);
            border: 2px solid #3b82f6;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .fc-card-back::after {
            content: 'TOP CLASS';
            color: rgba(0, 240, 255, 0.6);
            font-weight: 900;
            font-style: italic;
            font-size: 1.8rem;
            margin-top: 10px;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
        }

        .fc-card-front.toty {
            background-color: #020617;
            position: relative;
            clip-path: polygon(3% 0, 97% 0, 100% 3%, 100% 93%, 50% 100%, 0 93%, 0 3%);
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.6), inset 0 0 30px rgba(255, 15, 57, 0.4);
            border-radius: 0;
            overflow: hidden;
        }

        .toty-border-inner {
            position: absolute;
            top: 2px;
            left: 2px;
            right: 2px;
            bottom: 2px;
            clip-path: polygon(3% 0, 97% 0, 100% 3%, 100% 93%, 50% 100%, 0 93%, 0 3%);
            background: rgba(15, 23, 42, 0.4);
            box-shadow: inset 0 0 20px rgba(0, 240, 255, 0.8), inset 0 0 40px rgba(255, 15, 57, 0.6);
            z-index: 5;
            pointer-events: none;
        }

        .toty-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 80% 20%, rgba(0, 240, 255, 0.5) 0%, transparent 50%),
                radial-gradient(circle at 20% 80%, rgba(255, 15, 57, 0.6) 0%, transparent 50%),
                linear-gradient(135deg, #020617 0%, #1e1b4b 50%, #020617 100%);
            z-index: 1;
        }

        .toty-bg::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: linear-gradient(115deg, transparent 40%, rgba(0, 240, 255, 0.3) 41%, rgba(0, 240, 255, 0.9) 45%, rgba(0, 240, 255, 0) 46%);
            mix-blend-mode: screen;
            animation: slashMove 3s infinite ease-in-out alternate;
        }

        .toty-bg::after {
            content: '';
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: linear-gradient(-65deg, transparent 40%, rgba(255, 15, 57, 0.3) 41%, rgba(255, 15, 57, 0.9) 45%, rgba(255, 15, 57, 0) 46%);
            mix-blend-mode: screen;
            animation: slashMove2 4s infinite ease-in-out alternate;
        }

        @keyframes slashMove {
            0% {
                transform: translateX(-15px) translateY(-5px);
            }

            100% {
                transform: translateX(15px) translateY(5px);
            }
        }

        @keyframes slashMove2 {
            0% {
                transform: translateX(15px) translateY(5px);
            }

            100% {
                transform: translateX(-15px) translateY(-5px);
            }
        }

        .toty-lightning {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(60deg, transparent 48%, rgba(255, 255, 255, 0.4) 49%, rgba(0, 240, 255, 0.9) 50%, rgba(255, 255, 255, 0.4) 51%, transparent 52%),
                linear-gradient(-30deg, transparent 48%, rgba(255, 255, 255, 0.4) 49%, rgba(255, 15, 57, 0.9) 50%, rgba(255, 255, 255, 0.4) 51%, transparent 52%);
            background-size: 150% 150%;
            background-position: -20px -20px;
            mix-blend-mode: color-dodge;
            z-index: 2;
            opacity: 0.6;
            animation: lightningFlash 3s infinite;
        }

        @keyframes lightningFlash {

            0%,
            93% {
                opacity: 0.2;
            }

            94% {
                opacity: 1;
            }

            96% {
                opacity: 0.2;
            }

            97% {
                opacity: 0.8;
            }

            100% {
                opacity: 0.2;
            }
        }

        .text-stroke-2 {
            color: #fbbf24;
            -webkit-text-stroke: 1.5px black;
            text-shadow: 2px 2px 0 #000, 3px 3px 0 #000, 0px 4px 6px rgba(0, 0, 0, 0.8);
        }

        .shockwave {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 15px solid #ffffff;
            opacity: 0;
            z-index: 40;
            pointer-events: none;
            box-shadow: 0 0 50px #00f0ff, inset 0 0 50px #00f0ff;
        }

        .fc-card-container.engrave-flash .shockwave {
            animation: shockwaveAnim 0.7s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        @keyframes shockwaveAnim {
            0% {
                width: 10px;
                height: 10px;
                opacity: 1;
                border-width: 50px;
            }

            100% {
                width: 1500px;
                height: 1500px;
                opacity: 0;
                border-width: 0px;
            }
        }

        .fc-card-data {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            opacity: 0;
            filter: brightness(10) blur(20px);
            transform: scale(4);
            transition: opacity 0.3s ease-out, filter 0.3s ease-out, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.5);
        }

        .fc-card-container.engrave .fc-card-data {
            opacity: 1;
            filter: brightness(1) blur(0px);
            transform: scale(1);
        }

        .spark {
            position: absolute;
            width: 4px;
            height: 20px;
            border-radius: 2px;
            opacity: 0;
            z-index: 20;
        }

        .lead-form-wrapper {
            width: 95%;
            max-width: 450px;
            margin-top: 40px;
            z-index: 10;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
            display: none;
        }

        .lead-form-wrapper.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.4s ease-out forwards;
        }

        .layer_popup {
            z-index: 10000;
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            display: none;
        }

        .layer_popup .dimmed {
            z-index: 64;
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
        }

        .layer_popup .content {
            z-index: 128;
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 400px;
            background-color: #151b2b;
            border: 2px solid #fbbf24;
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.2);
        }
    </style>
</head>

<body class="antialiased">

    <header class="bg-fcpanel border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-md mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black text-white italic tracking-wider">
                INSURANCE <span class="text-fcaccent">ONLINE</span>
            </h1>
            <span class="text-sm font-bold bg-gray-800 text-fcaccent border border-fcaccent px-2 py-1">이적 시장</span>
        </div>
    </header>

    <main class="max-w-md mx-auto p-5 pb-20" id="step1">
        <div class="text-center mt-6 mb-8">
            <h2 class="text-4xl font-extrabold text-white leading-tight mb-4 tracking-tight">
                원하는 <span class="text-fcaccent">보험</span>을<br>선택하세요
            </h2>
            <p class="text-base text-gray-400 leading-relaxed">
                해당 분야의 <b>1대장 황금 카드</b><br>최저가 견적을 찾아 드립니다.
            </p>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <label class="cursor-pointer relative">
                <input type="radio" name="insType" value="종합보험" class="ins-radio peer hidden" checked>
                <div class="bg-fcpanel border border-gray-700 rounded-lg p-6 text-center transition-all duration-200">
                    <svg class="w-10 h-10 mx-auto text-gray-400 peer-checked:text-fcaccent mb-3" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z">
                        </path>
                    </svg>
                    <span class="block text-white font-bold text-lg">종합보험</span>
                    <div class="check-icon absolute top-4 right-4 text-fcaccent opacity-0 transition-opacity">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd"
                                d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                                clip-rule="evenodd"></path>
                        </svg>
                    </div>
                </div>
            </label>
            <label class="cursor-pointer relative">
                <input type="radio" name="insType" value="운전자보험" class="ins-radio peer hidden">
                <div class="bg-fcpanel border border-gray-700 rounded-lg p-6 text-center transition-all duration-200">
                    <svg class="w-10 h-10 mx-auto text-gray-400 peer-checked:text-fcaccent mb-3" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path>
                    </svg>
                    <span class="block text-white font-bold text-lg">운전자보험</span>
                    <div class="check-icon absolute top-4 right-4 text-fcaccent opacity-0 transition-opacity">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd"
                                d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                                clip-rule="evenodd"></path>
                        </svg>
                    </div>
                </div>
            </label>
            <label class="cursor-pointer relative">
                <input type="radio" name="insType" value="치아보험" class="ins-radio peer hidden">
                <div class="bg-fcpanel border border-gray-700 rounded-lg p-6 text-center transition-all duration-200">
                    <svg class="w-10 h-10 mx-auto text-gray-400 peer-checked:text-fcaccent mb-3" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M14 10l-2 1m0 0l-2-1m2 1v2.5M20 7l-2 1m2-1l-2-1m2 1v2.5M14 4l-2-1-2 1M4 7l2-1M4 7l2 1M4 7v2.5M12 21l-2-1m2 1l2-1m-2 1v-2.5M6 18l-2-1v-2.5M18 18l2-1v-2.5">
                        </path>
                    </svg>
                    <span class="block text-white font-bold text-lg">치아보험</span>
                    <div class="check-icon absolute top-4 right-4 text-fcaccent opacity-0 transition-opacity">

        function goToKakao() {
            const url = 'https://m.site.naver.com/21Vbn';
            try {
                if (window.top !== window.self) {
                    window.top.location.href = url;
                } else {
                    window.location.assign(url);
                }
            } catch (e) {
                window.open(url, '_blank');
                location.href = url;
            }

        function createExplosionSparks() {
            const colors = ['#ffffff', '#fef08a', '#fbbf24', '#f59e0b'];
            for (let i = 0; i < 80; i++) {
                let spark = document.createElement('div');
                spark.className = 'spark';
                spark.style.left = '50%';
                spark.style.top = '40%';
                spark.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                document.getElementById('pack-overlay').appendChild(spark);
                let angle = Math.random() * Math.PI * 2;
                let velocity = 50 + Math.random() * 80;
                let x = Math.cos(angle) * velocity;
                let y = Math.sin(angle) * velocity;
                spark.animate([
                    { transform: 'translate(0,0) scale(1) rotate(' + (angle * 180 / Math.PI + 90) + 'deg)', opacity: 1 },
                    { transform: `translate(${x * 10}px, ${y * 10}px) scale(0.1) rotate(${angle * 180 / Math.PI + 90}deg)`, opacity: 0 }
                ], {
                    duration: 400 + Math.random() * 400,
                    easing: 'cubic-bezier(0.2, 1, 0.3, 1)',
                    fill: 'forwards'
                });
            }
        }

                    </div>
                `;
            } else if (selectedIns === '치아보험') {
                document.getElementById('stat1Label').innerText = '임플란트'; document.getElementById('stat1').innerText = '130만';
                document.getElementById('stat2Label').innerText = '크라운'; document.getElementById('stat2').innerText = '50만';
                document.getElementById('stat3Label').innerText = '면책/감액'; document.getElementById('stat3').innerText = '최소화';
                document.getElementById('stat4Label').innerText = '가성비'; document.getElementById('stat4').innerText = 'MAX';

                reportDiv.innerHTML = `
                    <div class="text-fcgold font-black mb-4 text-center text-lg flex items-center justify-center">
                        <svg class="w-6 h-6 mr-2" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>

                    </div>
                    <div class="space-y-4">
                        <div class="bg-gray-800/80 p-4 rounded border border-gray-700">
                            <div class="flex justify-between items-center mb-3 border-b border-gray-600 pb-2">
                                <span class="font-bold text-fcaccent">[보철치료]</span>
                                <span class="text-xs bg-red-900/60 text-red-100 px-2 py-1 rounded font-bold">면책 90일 / 감액 2년</span>
                            </div>
                            <div class="space-y-3">
                                <div class="flex justify-between items-center"><span class="text-gray-300 text-base">임플란트 ⭐</span><span class="font-black text-white text-lg">130만원</span></div>
                                <div class="flex justify-between items-center"><span class="text-gray-300 text-base">브릿지 / 틀니</span><span class="font-bold text-white text-lg">65만 / 130만</span></div>
                            </div>
                        </div>
                        <div class="bg-gray-800/80 p-4 rounded border border-gray-700">
                            <div class="flex justify-between items-center mb-3 border-b border-gray-600 pb-2">
                                <span class="font-bold text-fcaccent">[보존치료]</span>
                                <span class="text-xs bg-red-900/60 text-red-100 px-2 py-1 rounded font-bold">면책 90일 / 감액 1년</span>
                            </div>
                            <div class="space-y-3">
                                <div class="flex justify-between items-center"><span class="text-gray-300 text-base">크라운(금니)</span><span class="font-black text-white text-lg">50만원</span></div>
                                <div class="flex justify-between items-center"><span class="text-gray-300 text-base">인/온레이 / 레진</span><span class="font-bold text-white text-lg">30만 / 8만</span></div>
                            </div>
                        </div>
                    </div>
                `;
            } else if (selectedIns === '운전자보험') {
                document.getElementById('stat1Label').innerText = '교사처'; document.getElementById('stat1').innerText = '최대 2억';
                document.getElementById('stat2Label').innerText = '변호사'; document.getElementById('stat2').innerText = '5백만';
                document.getElementById('stat3Label').innerText = '스쿨존'; document.getElementById('stat3').innerText = '3천만';
                document.getElementById('stat4Label').innerText = '자부상'; document.getElementById('stat4').innerText = '30만';

                reportDiv.innerHTML = `
                    <div class="text-fcgold font-black mb-4 text-center text-lg flex items-center justify-center">
                        <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2v7M2 12h7m6 0h7M12 15v7"></path><circle cx="12" cy="12" r="10" stroke-width="2"></circle></svg>
                        운전자 필수 핵심 특약
                    </div>
                    <div class="text-center mb-3">
                        <span class="inline-block text-fcaccent text-sm font-black bg-fcaccent/20 px-3 py-1 rounded-full border border-fcaccent/30 shadow-[0_0_10px_rgba(212,255,0,0.2)]">✨ 월 보험료 1만원대 가입 가능!</span>
                    </div>
                    <div class="space-y-4">
                        <div class="bg-gray-800/80 p-5 rounded-xl border-2 border-fcaccent/30 shadow-[0_0_15px_rgba(212,255,0,0.1)]">
                            <div class="flex justify-between items-center mb-4 border-b border-gray-600 pb-3">
                                <span class="font-black text-fcaccent text-lg italic">1. 형사/법정 비용</span>
                                <span class="text-[11px] bg-blue-900/60 text-blue-200 px-2 py-0.5 rounded font-bold border border-blue-800 uppercase">필수</span>
                            </div>
                            <div class="space-y-4">
                                <div class="flex justify-between items-end"><div class="text-left"><p class="text-gray-400 text-xs font-bold mb-1 leading-none">교통사고처리지원금 (6주 이상)</p><p class="text-white font-black text-xl leading-none">형사합의금 ⭐</p></div><span class="font-black text-fcgold text-2xl">2억원</span></div>
                                <div class="flex justify-between items-center pt-2 border-t border-gray-700/50"><span class="text-gray-300 font-bold text-base">6주 미만 사고</span><span class="font-black text-white text-lg">1,000만원</span></div>
                                <div class="flex justify-between items-center"><span class="text-gray-300 font-bold text-base">변호사선임비</span><span class="font-black text-white text-lg">500만원</span></div>
                                <div class="flex justify-between items-center"><span class="text-gray-300 font-bold text-base">벌금(대인) <span class="text-fcaccent text-xs">스쿨존 포함</span></span><span class="font-black text-white text-lg">3,000만원</span></div>
                            </div>
                        </div>
                        <div class="bg-gray-800/80 p-5 rounded-xl border border-gray-700">
                            <div class="flex justify-between items-center mb-4"><span class="font-black text-fcaccent text-lg italic">2. 부상 치료비</span><span class="text-[11px] bg-green-900/60 text-green-200 px-2 py-0.5 rounded font-bold border border-green-800 uppercase">강추!</span></div>
                            <div class="flex justify-between items-center"><span class="text-gray-300 font-bold text-base">가벼운 접촉사고 등 14급</span><span class="font-black text-white text-xl">30만원</span></div>
                        </div>
                    </div>
                `;
            } else if (selectedIns === '간병보험') {
                document.getElementById('stat1Label').innerText = '일반병원'; document.getElementById('stat1').innerText = '20만';
                document.getElementById('stat2Label').innerText = '요양병원'; document.getElementById('stat2').innerText = '6만';
                document.getElementById('stat3Label').innerText = '통합간병'; document.getElementById('stat3').innerText = '7만';
                document.getElementById('stat4Label').innerText = '면책/감액'; document.getElementById('stat4').innerText = 'ZERO';

                reportDiv.innerHTML = `
                    <div class="text-fcgold font-black mb-4 text-center text-lg flex items-center justify-center">
                        <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" stroke-width="2"></path></svg>
                        간병비 파산 방어 스쿼드
                    </div>
                    <div class="space-y-4">
                        <div class="bg-gray-800/80 p-4 rounded border border-gray-700 space-y-3">
                            <div class="flex justify-between items-center"><span class="text-gray-300 text-base">간병인사용(일반) ⭐</span><span class="font-black text-fcaccent text-lg">최대 20만원</span></div>
                            <div class="flex justify-between items-center"><span class="text-gray-300 text-base">간병인사용(요양)</span><span class="font-black text-fcaccent text-lg">최대 6만원</span></div>
                            <div class="flex justify-between items-center"><span class="text-gray-300 text-base">간호간병통합서비스</span><span class="font-black text-fcaccent text-lg">7만원</span></div>
                        </div>
                        <div class="bg-gray-800/80 p-4 rounded border border-gray-700 space-y-3 text-sm">
                            <div class="flex items-start"><span class="text-fcaccent mr-2 text-base">✅</span><span class="text-gray-300 text-base">요양병원 365일 보장 (업계 최고)</span></div>
                            <div class="flex items-start"><span class="text-fcaccent mr-2 text-base">✅</span><span class="text-gray-300 text-base font-bold">면책·감액 없이 즉시 보장 적용</span></div>
                        </div>
                    </div>
                `;
            }
            reportDiv.style.display = 'block';

            const overlay = document.getElementById('pack-overlay');
            const card = document.getElementById('fcCard');
            const form = document.getElementById('leadForm');
            const light = document.getElementById('stageLight');
            const flash = document.getElementById('screenFlash');

            document.getElementById('btnContractOpen').classList.remove('hidden');
            document.getElementById('compareForm').classList.add('hidden');
            document.getElementById('compareForm').classList.remove('animate-fade-in-up');
            document.getElementById('compareForm').reset();
            setGender('');

            overlay.style.display = 'flex';
            card.style.display = 'block';
            card.classList.remove('reveal', 'engrave', 'engrave-flash', 'charging');
            form.classList.remove('show');
            flash.classList.remove('explode');
            card.classList.add('waiting-click');
            document.getElementById('tapToOpenText').style.display = 'block';
            light.style.opacity = '1';
            document.body.style.overflow = 'hidden';
            card.onclick = handleCardClick;
        }

        function handleCardClick() {
            const overlay = document.getElementById('pack-overlay');
            const card = document.getElementById('fcCard');
            const form = document.getElementById('leadForm');
            const flash = document.getElementById('screenFlash');
            card.onclick = null;
            card.classList.remove('waiting-click');
            document.getElementById('tapToOpenText').style.display = 'none';
            card.classList.add('reveal');
            overlay.classList.add('overlay-shake');
            setTimeout(() => overlay.classList.remove('overlay-shake'), 500);
            setTimeout(() => {
                card.classList.add('engrave-flash');
                flash.classList.add('explode');
                card.classList.add('engrave');
                createExplosionSparks();
                setTimeout(() => {
                    card.style.display = 'none'; // 스카우트 리포트가 나올 때 카드를 숨깁니다.
                    form.classList.add('show');
                    overlay.scrollTo({ top: 0, behavior: 'smooth' });
                }, 1200);
            }, 500);
        }

        function cancelScout() {
            document.getElementById('pack-overlay').style.display = 'none';
            document.body.style.overflow = 'auto';
            document.querySelectorAll('.spark').forEach(e => e.remove());
        }

        function openInputForm() {
            document.getElementById('btnContractOpen').classList.add('hidden');
            const form = document.getElementById('compareForm');
            form.classList.remove('hidden');
            form.classList.add('animate-fade-in-up');
            setTimeout(() => {
                const overlay = document.getElementById('pack-overlay');
                overlay.scrollTo({ top: overlay.scrollHeight, behavior: 'smooth' });
            }, 100);
        }

        async function submitForm(event) {
            event.preventDefault();
            const birth = document.getElementById('userBirth').value;
            const gender = document.getElementById('userGender').value;
            const job = document.getElementById('userJob').value;
            const coverage = document.getElementById('userCoverage').value;
            const agree = document.getElementById('agreeTerms').checked;
            const selectedIns = document.querySelector('input[name="insType"]:checked').value;

            if (!birth || !gender || !job || !agree) {
                // 성별 미선택 시 강조 효과 등을 줄 수 있음
                return;
            }

            const copyText = `[스카우트 리포트 신청]\n- 보험종류: ${selectedIns}\n- 생년월일: ${birth}\n- 성별: ${gender}\n- 직업: ${job}\n- 보장내용: ${coverage || '상담 후 결정'}`;

            const textArea = document.createElement("textarea");
            textArea.value = copyText;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            textArea.style.top = "0";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try { document.execCommand('copy'); } catch (err) { }
            document.body.removeChild(textArea);

            document.getElementById('layerComplete').style.display = 'block';
        }
    </script>
</body>
