<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>치아보험 알릴 의무 사항</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
      background-color: #f3f4f6;
      word-break: keep-all;
      overflow-x: hidden;
    }

    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .card-shadow {
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.05), 0 2px 8px rgba(0, 0, 0, 0.02);
    }

    .tab-active {
      background-color: #1e293b;
      color: white;
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(30, 41, 59, 0.25);
      transform: translateY(-1px);
    }

    .tab-inactive {
      background-color: white;
      color: #64748b;
      font-weight: 600;
      border: 1px solid #e2e8f0;
    }

    .input-error {
      border-color: #ef4444 !important;
      background-color: #fef2f2 !important;
      animation: shake 0.4s both;
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15) !important;
    }

    .box-error {
      border: 2px solid #ef4444 !important;
      background-color: #fef2f2 !important;
      animation: shake 0.4s both;
      border-radius: 1rem;
      padding: 1rem;
    }

    @keyframes shake {

      10%,
      90% {
        transform: translate3d(-1px, 0, 0);
      }

      20%,
      80% {
        transform: translate3d(2px, 0, 0);
      }

      30%,
      50%,
      70% {
        transform: translate3d(-4px, 0, 0);
      }

      40%,
      60% {
        transform: translate3d(4px, 0, 0);
      }
    }

    @keyframes slideUpFade {
      0% {
        transform: translate(-50%, 20px) scale(0.95);
        opacity: 0;
      }

      100% {
        transform: translate(-50%, 0) scale(1);
        opacity: 1;
      }
    }

    .toast-enter {
      animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes swipeLeft {
      0% {
        opacity: 0;
        transform: translateX(20px);
      }

      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .animate-swipe-left {
      animation: swipeLeft 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-slide-down {
      animation: slideDown 0.3s ease-out forwards;
    }

    @keyframes gentlePulse {

      0%,
      100% {
        transform: scale(1);
        box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
      }

      50% {
        transform: scale(1.02);
        box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5);
      }
    }

    .animate-gentle-pulse {
      animation: gentlePulse 2.5s infinite ease-in-out;
    }

    .pb-safe {
      padding-bottom: calc(env(safe-area-inset-bottom) + 16px);
    }

    .suggest-chip {
      background-color: #eff6ff;
      color: #2563eb;
      border: 1px solid #bfdbfe;
      font-size: 13.5px;
      padding: 8px 16px;
      border-radius: 99px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .suggest-chip:active {
      transform: scale(0.95);
      background-color: #dbeafe;
    }

    .glass-nav {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }

    .glass-bottom {
      background: linear-gradient(to top, rgba(255, 255, 255, 1) 70%, rgba(255, 255, 255, 0));
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
  </style>
</head>

<body class="text-slate-800 antialiased selection:bg-blue-100">

  <div
    class="max-w-md mx-auto bg-white min-h-screen flex flex-col relative pb-32 overflow-hidden shadow-2xl ring-1 ring-slate-100">

    <div class="sticky top-0 z-50 glass-nav">
      <div class="flex items-center justify-between px-4 h-14">
        <button id="back-btn" onclick="goBack()"
          class="text-slate-600 bg-slate-50 hover:bg-slate-100 px-3 py-2 rounded-xl active:scale-95 transition-all flex items-center gap-1">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path>
          </svg>
          <span class="text-[14px] font-bold">이전</span>
        </button>
        <span id="header-title" class="font-extrabold text-[16px] text-slate-800">치아보험 알릴 의무</span>
        <button onclick="resetAll()"
          class="text-[13px] font-bold text-slate-400 hover:text-slate-600 px-3 py-2 rounded-xl active:scale-95 transition-all flex items-center gap-1">
          초기화
        </button>
      </div>
      <div class="w-full bg-slate-100 h-1">
        <div id="progress-bar" class="bg-blue-500 h-full transition-all duration-500 ease-out w-[0%] rounded-r-full">
        </div>
      </div>
    </div>

    <div id="app-container" class="px-5 pt-6 pb-10 flex-1 bg-slate-50/50">
      <!-- 스켈레톤 로딩 -->
      <div class="animate-pulse bg-white p-7 rounded-[1.5rem] h-64 mt-4 card-shadow border border-slate-100">
        <div class="h-4 bg-slate-200 rounded w-1/4 mb-4"></div>
        <div class="h-6 bg-slate-200 rounded w-3/4 mb-8"></div>
        <div class="h-12 bg-slate-200 rounded-2xl w-full mb-3"></div>
        <div class="h-12 bg-slate-200 rounded-2xl w-full"></div>
      </div>
    </div>

    <div id="action-btn-container"
      class="fixed bottom-0 left-1/2 transform -translate-x-1/2 w-full max-w-md px-5 pt-4 pb-6 glass-bottom z-40 pb-safe">
    </div>
  </div>

  <div id="toast"
    class="fixed top-16 left-1/2 transform -translate-x-1/2 hidden z-[999] w-[90%] max-w-sm pointer-events-none">
    <div id="toast-content"
      class="flex flex-col gap-1 px-5 py-4 rounded-2xl shadow-xl text-[14px] font-bold text-white leading-relaxed">
    </div>
  </div>

  <script>
    (function forceExternalBrowser() {
      const ua = navigator.userAgent.toLowerCase();
      if (ua.indexOf('kakaotalk') > -1) {
        const targetUrl = location.href;
        if (ua.indexOf('android') > -1) {
          location.href = 'intent://' + targetUrl.replace(/https?:\/\//i, '') + '#Intent;scheme=https;package=com.android.chrome;end';
        } else if (ua.indexOf('iphone') > -1 || ua.indexOf('ipad') > -1) {
          location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(targetUrl);
        }
      }
    })();

    const today = new Date();
    const formatDate = (d) => `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')}`;
    const calcDate = (m, y = 0) => { const d = new Date(today); d.setMonth(d.getMonth() - m); d.setFullYear(d.getFullYear() - y); return formatDate(d); };
    const getMonthOffset = (m, y = 0) => { const d = new Date(today); d.setMonth(d.getMonth() - m); d.setFullYear(d.getFullYear() - y); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`; };

    const date1y = calcDate(0, 1); const limit1y = getMonthOffset(0, 1);
    const date5y = calcDate(0, 5); const limit5y = getMonthOffset(0, 5);

    // 치과 질환 전용 라이브러리
    const diseaseLibrary = {
      "충치": ["충치(치아우식증)", "치수염", "신경치료", "레진", "인레이", "크라운"],
      "잇몸": ["치주염(풍치)", "잇몸병", "치은염", "스케일링", "치주수술"],
      "상실": ["자연치상실", "임플란트", "틀니", "브릿지"],
      "기타": ["치아파절", "사랑니발치", "턱관절장애"]
    };

    // 라이나 치아보험 알릴의무 질문 (3개)
    const questions = [
      {
        periodLabel: "현재", dateBadge: "상태",
        text: "현재 <span class='text-blue-600 font-extrabold'>틀니</span>를 하고 계십니까?",
        limit: null, limitMsg: "틀니 착용 여부를 기재해주세요."
      },
      {
        periodLabel: "최근 1년 이내", dateBadge: date1y + " 이후",
        text: "충치(치아우식증)로 인해 아래와 같은 의료행위를 받은 적이 있습니까?<div class='mt-4 flex flex-wrap justify-center gap-2'><span class='bg-blue-50 text-blue-700 border border-blue-100 font-extrabold px-3.5 py-2 rounded-xl shadow-sm text-[14.5px] tracking-tight'>진찰</span><span class='bg-blue-50 text-blue-700 border border-blue-100 font-extrabold px-3.5 py-2 rounded-xl shadow-sm text-[14.5px] tracking-tight'>치료</span><span class='bg-blue-50 text-blue-700 border border-blue-100 font-extrabold px-3.5 py-2 rounded-xl shadow-sm text-[14.5px] tracking-tight'>투약</span><span class='bg-blue-50 text-blue-700 border border-blue-100 font-extrabold px-3.5 py-2 rounded-xl shadow-sm text-[14.5px] tracking-tight'>치료가 필요하다는 진단</span></div>",
        limit: limit1y, limitMsg: "1년 이내 내역을 적어주세요.",
        descAlert: [
          "<strong class='text-red-700 underline underline-offset-4 decoration-red-300'>진찰이란?</strong> 건강검진을 포함한 검진, 질병의심소견(진단서 또는 소견서)을 발급받은 경우",
          "<strong class='text-red-700 underline underline-offset-4 decoration-red-300'>투약이란?</strong> 환자에게 약을 처방하는 행위 (실제로 약을 구입하지 않았어도 기재)",
          "<strong class='text-red-700 underline underline-offset-4 decoration-red-300'>치료란?</strong> 충전치료(레진, 인레이 등) 및 보철치료(크라운, 브릿지, 임플란트 등)를 받는 행위"
        ]
      },
      {
        periodLabel: "최근 5년 이내", dateBadge: date5y + " 이후",
        text: "치주질환(잇몸병, 풍치)으로 인해 아래에 해당하는 사항이 있습니까?<div class='mt-4 flex flex-wrap justify-center gap-2'><span class='bg-blue-50 text-blue-700 border border-blue-100 font-extrabold px-3.5 py-2 rounded-xl shadow-sm text-[14.5px] tracking-tight'>자연치 1개 이상 상실</span><span class='bg-blue-50 text-blue-700 border border-blue-100 font-extrabold px-3.5 py-2 rounded-xl shadow-sm text-[14.5px] tracking-tight'>치주수술(잇몸수술)</span><span class='bg-blue-50 text-blue-700 border border-blue-100 font-extrabold px-3.5 py-2 rounded-xl shadow-sm text-[14.5px] tracking-tight'>치주수술 필요진단</span></div>",
        limit: limit5y, limitMsg: "5년 이내 내역을 적어주세요.",
        descAlert: [
          "<strong class='text-red-700 underline underline-offset-4 decoration-red-300'>치주수술이란?</strong> 치은을 박리하여 치석이나 염증조직을 직접적으로 제거하는 치주치료 (외과적 치주치료, 치은소파술 등)"
        ]
      }
    ];

    const TOTAL_STEPS = questions.length;
    let step = 0; let view = 'intro'; let answers = {}; let diseases = []; let currentTabId = null; let nextDiseaseId = 1;
    const STORAGE_KEY = 'dental_insurance_wizard_lina';

    function saveData() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ step, view, answers, diseases, currentTabId, nextDiseaseId })); } catch (e) { } }
    function loadData() { try { const s = localStorage.getItem(STORAGE_KEY); if (s) { const p = JSON.parse(s); step = p.step || 0; view = p.view || 'intro'; answers = p.answers || {}; diseases = p.diseases || []; currentTabId = p.currentTabId; nextDiseaseId = p.nextDiseaseId || 1; } } catch (e) { } }
    function resetAll() { try { localStorage.removeItem(STORAGE_KEY); } catch (e) { } step = 0; view = 'intro'; answers = {}; diseases = []; currentTabId = null; nextDiseaseId = 1; render(true); showToast("처음부터 다시 시작합니다.", false); }

    window.addEventListener('popstate', function (event) { if (step > 0 || view === 'd' || view === 'q') { try { history.pushState(null, null, location.href); } catch (e) { } goBack(); } });

    function render(animate = true) {
      saveData();
      const container = document.getElementById('app-container');
      const headerTitle = document.getElementById('header-title');
      const progressBar = document.getElementById('progress-bar');
      const backBtn = document.getElementById('back-btn');

      container.classList.remove('animate-swipe-left'); if (animate) void container.offsetWidth; container.classList.add('animate-swipe-left');

      if (view === 'intro') {
        headerTitle.innerText = `치아보험 알릴 의무`; progressBar.style.width = `0%`; backBtn.style.visibility = 'hidden';
        container.innerHTML = renderIntroView(); updateActionBtn('네, 동의하고 시작할게요', false);
      } else if (step < TOTAL_STEPS) {
        const progress = Math.round(((step) / TOTAL_STEPS) * 100); progressBar.style.width = `${progress}%`; backBtn.style.visibility = 'visible';
        if (view === 'q') { headerTitle.innerText = `질문 ${step + 1} / ${TOTAL_STEPS}`; container.innerHTML = renderQuestionView(step); updateActionBtn('질문에 답변해 주세요', true); }
        else if (view === 'd') { headerTitle.innerText = `상세 내용 입력`; ensureDiseaseExistsForStep(step); container.innerHTML = renderDetailView(step); updateActionBtn(step === TOTAL_STEPS - 1 ? '결과 확인하기' : '다음 질문으로', false); }
      } else {
        progressBar.style.width = `100%`; headerTitle.innerText = `작성 완료`;
        container.innerHTML = renderSummaryView();
        updateActionBtn('', false, true);
      }
    }

    function renderIntroView() {
      return `
        <div class="bg-white p-8 rounded-[2rem] card-shadow border border-slate-100 flex flex-col items-center text-center mt-2 relative">
          <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-[36px] mb-6 shadow-sm">🦷</div>
          <h2 class="text-[22px] font-extrabold text-slate-800 mb-3 leading-[1.3] tracking-tight">치아보험 가입을 위한<br><span class="text-blue-600">알릴 의무 사항</span>입니다.</h2>
          <p class="text-[15px] text-slate-500 mb-8 font-medium">묻지 않은 내용까지 적으실 필요 없습니다!</p>
          
          <div class="bg-slate-50 rounded-2xl p-4 text-left w-full border border-slate-100 flex flex-col gap-3">
            <div class="flex items-center gap-2">
              <div class="bg-white text-blue-500 rounded-full p-1 shadow-sm shrink-0">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
              </div>
              <p class="text-[13.5px] text-slate-600 whitespace-nowrap tracking-tight">
                질문에 <span class="text-blue-600 font-extrabold text-[15px]">'예'</span>라고 답한 경우만 작성해주세요
              </p>
            </div>
            <div class="flex items-center gap-2">
              <div class="bg-white text-blue-500 rounded-full p-1 shadow-sm shrink-0">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
              </div>
              <p class="text-[13.5px] text-slate-600 whitespace-nowrap tracking-tight">
                <strong class="text-blue-600 font-extrabold text-[14px]">1년 이내, 5년 이내</strong> 기간인지 확인해주세요
              </p>
            </div>
          </div>
        </div>`;
    }

    function renderQuestionView(idx) {
      const q = questions[idx];
      const yClass = answers[idx] === 'yes' ? 'bg-blue-50 text-blue-700 border-2 border-blue-500 shadow-md ring-4 ring-blue-50' : 'bg-white text-slate-600 border-2 border-slate-100 hover:border-slate-200';
      const nClass = answers[idx] === 'no' ? 'bg-slate-800 text-white border-2 border-slate-800 shadow-lg' : 'bg-white text-slate-600 border-2 border-slate-100 hover:border-slate-200';

      let tagsHtml = '';
      if (q.tags) {
        tagsHtml = `<div class="flex flex-wrap gap-2 mt-4">${q.tags.map(t => `<span class="bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg text-[13px] font-bold border border-slate-200">${t}</span>`).join('')}</div>`;
      }

      return `
        <div class="bg-white p-6 rounded-[2rem] card-shadow border border-slate-100">
          <div class="flex items-center justify-between mb-5">
            <span class="bg-slate-100 text-slate-500 font-bold px-3 py-1.5 rounded-lg text-[13px]">Q${idx + 1}</span>
            <div class="bg-blue-50 text-blue-600 font-extrabold px-3 py-1.5 rounded-lg text-[18px] flex items-center gap-2">
              ${q.periodLabel} <span class="bg-white px-2 py-0.5 rounded text-[13px] font-bold shadow-sm">${q.dateBadge}</span>
            </div>
          </div>
          
          <p class="font-extrabold text-slate-800 text-[19px] leading-snug break-keep px-1">${q.text}</p>
          ${tagsHtml}
          
          ${q.descAlert ? `
          <div class="bg-red-50/50 rounded-2xl p-4 mt-6 space-y-3 border border-red-200 shadow-inner">
            ${q.descAlert.map(d => `<div class="flex items-start gap-2"><span class="text-red-500 mt-0.5">📌</span><p class="text-[13.5px] text-slate-700 font-medium break-keep leading-relaxed">${d}</p></div>`).join('')}
          </div>` : ''}
          
          <div class="flex flex-row gap-3 mt-8">
            <button onclick="handleAnswer('yes')" class="flex-1 h-20 rounded-2xl font-extrabold transition-all duration-200 ${yClass} flex flex-col items-center justify-center gap-1 active:scale-95"><span class="text-[22px]">🙌</span><span class="text-[14px]">네, 있습니다</span></button>
            <button onclick="handleAnswer('no')" class="flex-1 h-20 rounded-2xl font-extrabold transition-all duration-200 ${nClass} flex flex-col items-center justify-center gap-1 active:scale-95"><span class="text-[22px] opacity-80">🙅</span><span class="text-[14px]">아니오, 없습니다</span></button>
          </div>
        </div>`;
    }

    function handleAnswer(val) {
      answers[step] = val;
      render(false);
      setTimeout(() => {
        if (val === 'yes') {
          // 1번 틀니 질문일 경우 기본값 세팅
          let defaultName = "";
          if (step === 0) defaultName = "틀니";
          ensureDiseaseExistsForStep(step, defaultName);
          view = 'd'; render(true);
        }
        else { diseases = diseases.filter(d => d.qIndex !== step); goNext(); }
      }, 250);
    }

    function ensureDiseaseExistsForStep(qIdx, defaultName = '') {
      const stepDiseases = diseases.filter(d => d.qIndex === qIdx);
      if (stepDiseases.length === 0) {
        addDiseaseToStep(qIdx, false, defaultName);
      } else if (!currentTabId || !diseases.find(d => d.id === currentTabId && d.qIndex === qIdx)) {
        currentTabId = stepDiseases[0].id;
      }
    }

    function addDiseaseToStep(qIdx, shouldScroll = true, defaultName = '') {
      const newId = nextDiseaseId++;
      diseases.push({
        id: newId, qIndex: qIdx,
        name: defaultName, startDate: '', endDate: '',
        outPatientDays: '', isHospitalized: false, isSurgery: false,
        treatment: '', isCured: null, // 완치여부 추가
        nameError: false, dateError: false, sequenceError: false, daysError: false, treatError: false, curedError: false
      });
      currentTabId = newId;
      if (view === 'd') { render(false); if (shouldScroll) { setTimeout(() => { window.scrollTo({ top: 0, behavior: 'smooth' }); const tc = document.getElementById('tabs-container'); if (tc) tc.scrollLeft = tc.scrollWidth; }, 50); } }
    }

    function switchTab(id) { currentTabId = id; render(false); }

    function removeDisease(id) {
      const stepDiseases = diseases.filter(d => d.qIndex === step);
      if (stepDiseases.length <= 1) return showToast("최소 1개의 내역은 입력해야 합니다.", true);
      diseases = diseases.filter(d => d.id !== id);
      currentTabId = diseases.filter(d => d.qIndex === step)[0].id;
      render(false);
    }

    function renderDetailView(qIdx) {
      const stepDiseases = diseases.filter(d => d.qIndex === qIdx);
      const d = diseases.find(d => d.id === currentTabId);
      if (!d) return '';

      let tabsHtml = `<div class="flex items-center gap-2 overflow-x-auto pb-2 mb-4 snap-x hide-scrollbar" id="tabs-container">`;
      tabsHtml += stepDiseases.map((sd, i) => { const hasErr = sd.dateError || sd.daysError || sd.nameError || sd.sequenceError || sd.treatError || sd.curedError; return `<button onclick="switchTab(${sd.id})" class="relative snap-start shrink-0 px-5 py-2.5 rounded-full text-[14px] transition-all ${sd.id === currentTabId ? 'tab-active shadow-md' : 'tab-inactive'}">건수 ${i + 1} ${hasErr ? '<span class="w-2 h-2 bg-red-500 rounded-full absolute top-0 right-1 border border-white"></span>' : ''}</button>`; }).join('');
      tabsHtml += `<button onclick="addDiseaseToStep(${qIdx})" class="snap-start shrink-0 px-4 py-2.5 rounded-full text-[13px] font-bold border border-dashed border-slate-400 text-slate-500 bg-white flex items-center gap-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>추가</button></div>`;

      let formHtml = `
        <div class="bg-white p-6 rounded-[2rem] card-shadow border border-slate-100 pb-8">
          <div class="flex justify-between items-center mb-6 pb-4 border-b border-slate-50">
            <h3 class="font-extrabold text-slate-800 text-[18px]">상세 내용 작성</h3>
            ${stepDiseases.length > 1 ? `<button onclick="removeDisease(${d.id})" class="text-[12px] font-bold text-red-500 bg-red-50 px-3 py-1.5 rounded-lg active:scale-95 transition-all">삭제</button>` : ''}
          </div>
          
          <div class="space-y-8">
            <!-- 1. 질병명 -->
            <div>
              <label class="flex justify-between items-center text-[14px] font-bold text-slate-600 mb-2">
                1. 질병명 <span class="text-[11px] text-red-500 bg-red-50 px-2 py-0.5 rounded font-bold">필수</span>
              </label>
              <p class="text-[12px] text-slate-400 mb-3 ml-1">충치, 치아파절 등 (질병 코드가 있으면 더욱 좋습니다)</p>
              <input type="text" placeholder="예: 충치, 치주염 (K05 등)" value="${d.name}" oninput="this.classList.remove('input-error'); handleNameInput(this.value)" class="w-full h-14 px-4 bg-slate-50 border ${d.nameError ? 'input-error' : 'border-slate-200'} rounded-xl text-[15px] outline-none focus:border-blue-500 focus:bg-white transition-all font-bold">
              <div id="suggest-box"></div>
            </div>

            <!-- 2. 내원 기간 -->
            <div>
              <label class="flex justify-between items-center text-[14px] font-bold text-slate-600 mb-2">
                2. 최초내원일 ~ 최종내원일 <span class="text-[11px] text-red-500 bg-red-50 px-2 py-0.5 rounded font-bold">필수</span>
              </label>
              <p class="text-[12px] text-slate-400 mb-3 ml-1">기억 안 나시면 년월까지만 대략 적어주세요.</p>
              <div class="flex items-center gap-2">
                <input type="month" value="${d.startDate}" onchange="updateD('startDate', this.value)" class="flex-1 h-14 px-2 bg-slate-50 border ${d.dateError || d.sequenceError ? 'input-error' : 'border-slate-200'} rounded-xl text-center text-[15px] outline-none font-bold focus:border-blue-500 focus:bg-white">
                <span class="text-slate-400 font-bold">~</span>
                <input type="month" value="${d.endDate}" onchange="updateD('endDate', this.value)" class="flex-1 h-14 px-2 bg-slate-50 border ${d.dateError || d.sequenceError ? 'input-error' : 'border-slate-200'} rounded-xl text-center text-[15px] outline-none font-bold focus:border-blue-500 focus:bg-white">
              </div>
              ${d.sequenceError ? `<p class="text-red-500 text-[12px] font-bold mt-2">🚨 시작일이 종료일보다 나중입니다!</p>` : ''}
            </div>

            <!-- 3. 통원/입원/수술 여부 -->
            <div class="${d.daysError ? 'box-error p-3 -mx-3' : ''}">
              <label class="block text-[14px] font-bold text-slate-600 mb-4">3. 통원 며칠인지, 입원, 수술 여부</label>
              
              <div class="bg-slate-50 border border-slate-200 rounded-xl p-3 focus-within:border-blue-500 focus-within:bg-white transition-all mb-4">
                <span class="block text-[12px] font-bold text-slate-500 mb-1">통원 일수 (숫자만)</span>
                <div class="flex items-center"><input type="tel" value="${d.outPatientDays}" oninput="updateD('outPatientDays', this.value)" class="w-full font-extrabold text-[16px] bg-transparent outline-none"><span class="text-slate-400 text-[14px]">일</span></div>
              </div>

              <div class="flex flex-col gap-3">
                <div class="bg-slate-50 border border-slate-200 rounded-xl p-3">
                  <div class="flex items-center justify-between mb-3"><span class="text-[14px] font-bold text-slate-700">🏥 입원 여부</span></div>
                  <div class="flex gap-2">
                    <button onclick="updateD('isHospitalized', true); render(false);" class="flex-1 h-12 rounded-lg font-bold text-[14px] transition-all ${d.isHospitalized ? 'bg-blue-600 text-white' : 'bg-white border border-slate-200 text-slate-500'}">입원함</button>
                    <button onclick="updateD('isHospitalized', false); render(false);" class="flex-1 h-12 rounded-lg font-bold text-[14px] transition-all ${!d.isHospitalized ? 'bg-slate-700 text-white' : 'bg-white border border-slate-200 text-slate-500'}">안함</button>
                  </div>
                </div>

                <div class="bg-slate-50 border border-slate-200 rounded-xl p-3">
                  <div class="flex items-center justify-between mb-3"><span class="text-[14px] font-bold text-slate-700">🔪 수술(발치/임플란트 등) 여부</span></div>
                  <div class="flex gap-2">
                    <button onclick="updateD('isSurgery', true); render(false);" class="flex-1 h-12 rounded-lg font-bold text-[14px] transition-all ${d.isSurgery ? 'bg-blue-600 text-white' : 'bg-white border border-slate-200 text-slate-500'}">수술함</button>
                    <button onclick="updateD('isSurgery', false); render(false);" class="flex-1 h-12 rounded-lg font-bold text-[14px] transition-all ${!d.isSurgery ? 'bg-slate-700 text-white' : 'bg-white border border-slate-200 text-slate-500'}">안함</button>
                  </div>
                </div>
              </div>
            </div>

            <!-- 4. 치료 방법 -->
            <div>
              <label class="flex justify-between items-center text-[14px] font-bold text-slate-600 mb-2">
                4. 치료 방법 <span class="text-[11px] text-red-500 bg-red-50 px-2 py-0.5 rounded font-bold">필수</span>
              </label>
              <p class="text-[12px] text-slate-400 mb-3 ml-1">임플란트, 레진, 크라운, 신경치료 등 구체적인 명칭</p>
              <textarea rows="2" placeholder="예: 오른쪽 아래 어금니 임플란트 1개" oninput="updateD('treatment', this.value)" class="w-full p-4 bg-slate-50 border ${d.treatError ? 'input-error' : 'border-slate-200'} rounded-xl text-[14px] font-medium outline-none resize-none focus:bg-white focus:border-blue-500 transition-all">${d.treatment || ''}</textarea>
            </div>

            <!-- 5. 완치 여부 -->
            <div class="${d.curedError ? 'box-error p-3 -mx-3' : ''}">
              <label class="flex justify-between items-center text-[14px] font-bold text-slate-600 mb-3">
                5. 완치 여부 <span class="text-[11px] text-red-500 bg-red-50 px-2 py-0.5 rounded font-bold">필수</span>
              </label>
              <div class="flex gap-2">
                <button onclick="updateD('isCured', true); render(false);" class="flex-1 h-14 rounded-xl font-bold text-[15px] transition-all ${d.isCured === true ? 'bg-blue-600 text-white shadow-md' : 'bg-white border border-slate-200 text-slate-500'}">✅ 완치(치료종료)</button>
                <button onclick="updateD('isCured', false); render(false);" class="flex-1 h-14 rounded-xl font-bold text-[15px] transition-all ${d.isCured === false ? 'bg-slate-700 text-white shadow-md' : 'bg-white border border-slate-200 text-slate-500'}">⏳ 치료 중 / 예정</button>
              </div>
            </div>
            
            <div class="pt-6 border-t border-slate-100 mt-8 relative">
              <div class="absolute top-[-14px] left-1/2 transform -translate-x-1/2 bg-white px-3 text-slate-300">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-14c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6z"/></svg>
              </div>
              <p class="text-[14px] text-blue-600 font-extrabold text-center mb-3 mt-2">이 질문에 해당하는 다른 치아 병력이 더 있나요?</p>
              <button onclick="addDiseaseToStep(${qIdx})" class="w-full h-14 rounded-xl font-extrabold text-[15px] bg-blue-50 border border-blue-200 text-blue-600 shadow-sm flex items-center justify-center gap-2 hover:bg-blue-100 transition-all active:scale-95">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg> 
                치아 병력 하나 더 추가하기
              </button>
            </div>

          </div>
        </div>`;
      return tabsHtml + formHtml;
    }

    function updateD(f, v) {
      const d = diseases.find(d => d.id === currentTabId);
      if (d) {
        d[f] = v;
        if (f === 'name') d.nameError = false;
        if (f === 'startDate' || f === 'endDate') { d.dateError = false; d.sequenceError = false; }
        if (f === 'outPatientDays') d.daysError = false;
        if (f === 'treatment') d.treatError = false;
        if (f === 'isCured') d.curedError = false;
        saveData();
      }
    }

    function handleNameInput(val) {
      updateD('name', val); const d = diseases.find(d => d.id === currentTabId);
      const box = document.getElementById('suggest-box'); if (!val) { box.innerHTML = ''; return; }
      let matched = []; const kw = val.toLowerCase().replace(/\s/g, "");
      for (let k in diseaseLibrary) { if (k.includes(kw) || kw.includes(k)) matched = [...matched, ...diseaseLibrary[k]]; diseaseLibrary[k].forEach(dn => { if (dn.replace(/\s/g, "").includes(kw)) matched.push(dn); }); }
      matched = [...new Set(matched)].slice(0, 6);
      if (matched.length) { box.innerHTML = `<div class="mt-2 p-3 bg-blue-50 rounded-xl border border-blue-100 flex flex-wrap gap-2"><span class="w-full text-[12px] font-bold text-blue-600 mb-1">💡 치과 추천 병명</span>${matched.map(m => `<div onclick="updateD('name', '${m}'); document.getElementById('suggest-box').innerHTML='';" class="suggest-chip">${m}</div>`).join('')}</div>`; } else box.innerHTML = '';
    }

    function renderSummaryView() {
      const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
      return `
        <div class="bg-white p-8 rounded-[2rem] card-shadow border border-slate-100 text-center mb-6 mt-4">
          <div class="w-16 h-16 bg-[#FEE500] text-[#371D1E] rounded-full flex items-center justify-center mx-auto mb-5 shadow-lg">
            <svg class="w-8 h-8" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3c-5.52 0-10 3.58-10 8 0 2.86 1.83 5.37 4.6 6.78-.31 1.13-1.12 4.12-1.15 4.25-.04.14.04.28.17.34.06.02.13.02.19 0 .15-.05 3.32-2.22 4.65-3.15.5.07 1.01.1 1.54.1 5.52 0 10-3.58 10-8s-4.48-8-10-8z"/></svg>
          </div>
          <h2 class="text-[22px] font-extrabold text-slate-800 mb-4">작성이 완료되었습니다!</h2>
          <div class="bg-slate-50 p-5 rounded-xl border border-slate-100">
            <p class="text-[14.5px] text-slate-600 font-medium leading-relaxed">
              아래 버튼을 눌러 담당 설계사에게<br><strong class="text-slate-800">카카오톡으로 결과를 전달</strong>해주세요.
            </p>
          </div>
        </div>
        <div class="grid grid-cols-1 gap-3 mb-10">
          <button onclick="shareReport()" class="w-full h-16 rounded-xl font-extrabold text-[16px] bg-[#FEE500] text-[#371D1E] shadow-md active:scale-95 transition-all flex items-center justify-center gap-2 hover:bg-[#FDD800]">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
            ${isMobile ? '카카오톡으로 공유하기' : '결과 복사하기 (PC용)'}
          </button>
        </div>`;
    }

    function goBack() { if (view === 'q' && step === 0) { view = 'intro'; render(true); } else if (view === 'd') { view = 'q'; render(true); } else if (step > 0) { step--; if (answers[step] === 'yes') view = 'd'; else view = 'q'; render(true); } }
    function goNext() { step++; view = 'q'; if (step >= TOTAL_STEPS) view = 'summary'; render(true); window.scrollTo({ top: 0, behavior: 'smooth' }); }

    function validateAndNext() {
      const stepDiseases = diseases.filter(d => d.qIndex === step); let isValid = true, firstErr = null, msg = "";
      stepDiseases.forEach(d => {
        d.dateError = false; d.sequenceError = false; d.daysError = false; d.nameError = false; d.treatError = false; d.curedError = false;

        if (!d.name.trim()) { d.nameError = true; isValid = false; if (!msg) msg = "어떤 질병인지 입력해주세요."; }

        if (!d.startDate || !d.endDate) { d.dateError = true; isValid = false; if (!msg) msg = "내원 기간을 입력해주세요."; }
        else if (new Date(d.startDate) > new Date(d.endDate)) { d.sequenceError = true; isValid = false; if (!msg) msg = "시작일이 종료일보다 늦습니다."; }
        else { const limit = questions[step].limit; if (limit && d.endDate < limit) { d.dateError = true; isValid = false; if (!msg) msg = questions[step].limitMsg; } }

        const outD = parseInt(d.outPatientDays) || 0;
        if (outD === 0 && !d.isSurgery && !d.isHospitalized) { d.daysError = true; isValid = false; if (!msg) msg = "통원 일수나 수술/입원 여부를 입력해주세요."; }

        if (!d.treatment.trim()) { d.treatError = true; isValid = false; if (!msg) msg = "치료 방법을 구체적으로 적어주세요."; }
        if (d.isCured === null) { d.curedError = true; isValid = false; if (!msg) msg = "완치 여부를 선택해주세요."; }

        if (!isValid && !firstErr) firstErr = d.id;
      });
      if (!isValid) { showToast(msg, true); if (firstErr) switchTab(firstErr); return; } goNext();
    }

    function updateActionBtn(text, disabled, isShare = false) {
      const bContainer = document.getElementById('action-btn-container');
      if (isShare) {
        bContainer.innerHTML = `<button onclick="resetAll()" class="w-full h-14 rounded-xl font-bold text-[15px] bg-white border border-slate-200 text-slate-500 active:scale-95 transition-all flex items-center justify-center gap-2">처음으로 돌아가기</button>`;
      } else {
        if (view === 'intro') { bContainer.innerHTML = `<button onclick="handleActionClick()" class="w-full h-16 rounded-xl font-extrabold text-[16px] bg-blue-600 text-white shadow-lg shadow-blue-500/30 active:scale-95 transition-all animate-gentle-pulse">${text}</button>`; }
        else if (disabled) { bContainer.innerHTML = `<button disabled class="w-full h-16 rounded-xl font-extrabold text-[16px] bg-slate-100 text-slate-400 border border-slate-200 cursor-not-allowed transition-all">${text}</button>`; }
        else { bContainer.innerHTML = `<button onclick="handleActionClick()" class="w-full h-16 rounded-xl font-extrabold text-[16px] bg-slate-800 text-white shadow-lg active:scale-95 transition-all">${text}</button>`; }
      }
    }

    function handleActionClick() { if (view === 'intro') { view = 'q'; render(true); return; } if (view === 'q') return; if (view === 'd') validateAndNext(); }

    async function shareReport() {
      let r = `📋 [라이나 치아보험 알릴 의무 리포트]\n작성일시: ${new Date().toLocaleString()}\n\n■ 기본 응답\n`;
      for (let i = 0; i < TOTAL_STEPS; i++) r += `[Q${i + 1}] ${answers[i] === 'yes' ? '🔴 예' : '🟢 아니오'}\n`;
      const filledDiseases = diseases.filter(d => d.name || d.startDate);
      if (filledDiseases.length === 0) { r += "\n✨ 특이사항 없음!\n"; }
      else {
        r += "\n■ 상세 내용\n";
        filledDiseases.forEach((d, i) => {
          r += `\n< 건수 ${i + 1} (🦷 치아) >\n`;
          r += `1. 질병명: ${d.name}\n`;
          r += `2. 내원기간: ${d.startDate} ~ ${d.endDate}\n`;
          r += `3. 진료내용: 통원 ${d.outPatientDays || 0}일 / 입원(${d.isHospitalized ? 'O' : 'X'}) / 수술(${d.isSurgery ? 'O' : 'X'})\n`;
          r += `4. 치료방법: ${d.treatment || '없음'}\n`;
          r += `5. 완치여부: ${d.isCured ? '✅ 완치(치료종료)' : '⏳ 치료 중/예정'}\n`;
        });
      }
      r += "\n=============\n작성 완료했습니다. 확인 부탁드립니다! 😊\n";

      const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
      if (isMobile && navigator.share) {
        try { await navigator.share({ title: '라이나 치아보험 알릴 의무 리포트', text: r }); showToast("✅ 공유 메뉴가 열렸습니다!", false); }
        catch (err) { if (err.name !== 'AbortError') fallbackCopyText(r); }
      } else { fallbackCopyText(r); }
    }

    function fallbackCopyText(text) {
      const ta = document.createElement("textarea"); ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta); ta.focus(); ta.select();
      try { document.execCommand('copy'); showToast("✅ 내용이 복사되었습니다! 붙여넣기 해주세요.", false); } catch (err) { }
      document.body.removeChild(ta);
    }

    function showToast(m, isE) {
      const t = document.getElementById('toast'), c = document.getElementById('toast-content');
      t.classList.remove('hidden'); t.classList.add('toast-enter');
      c.className = `flex flex-col gap-1 px-4 py-3 rounded-xl shadow-lg text-[14px] font-bold text-white bg-slate-800 text-center z-[999] border-l-4 ${isE ? 'border-red-500' : 'border-blue-500'}`;
      c.innerHTML = `<span>${m}</span>`;
      setTimeout(() => { t.classList.remove('toast-enter'); t.classList.add('hidden'); }, 3000);
    }

    window.addEventListener('DOMContentLoaded', () => {
      try { history.pushState(null, null, location.href); } catch (e) { }
      loadData(); render(false);
    });
  </script>
</body>

</html>
